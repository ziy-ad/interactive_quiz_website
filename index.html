<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic setup for the page -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple IT Quiz</title>
  
  <!-- Google Font for clean text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. GLOBAL STYLES (Background, Fonts, Colors)
       ========================================= */
    * {
      box-sizing: border-box; /* Ensures padding doesn't affect width */
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f4f8; /* Soft light gray-blue */
      color: #1e293b; /* Dark slate text */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh; /* Full height of screen */
      padding: 20px;
    }

    /* =========================================
       2. MAIN CONTAINER (The White Card)
       ========================================= */
    .quiz-container {
      background-color: white;
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* Soft shadow under card */
      padding: 40px;
      text-align: center;
    }

    /* =========================================
       3. START SCREEN ELEMENTS
       ========================================= */
    h1 { color: #3b82f6; margin-bottom: 10px; }
    .subtitle { color: #64748b; margin-bottom: 30px; }
    
    .btn {
      background-color: #3b82f6; /* Blue button */
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background-color: #2563eb; } /* Darker blue on hover */

    /* =========================================
       4. QUIZ SCREEN ELEMENTS (Hidden by default)
       ========================================= */
    #quiz-screen { display: none; }
    
    .header-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-weight: 600;
      color: #64748b;
    }
    .score-text { color: #3b82f6; }

    /* The Question text */
    #question-text {
      font-size: 24px;
      margin-bottom: 30px;
      min-height: 70px;
    }

    /* The container holding the 4 answer buttons */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 15px; /* Space between buttons */
    }

    /* Individual Answer Button style */
    .option {
      background-color: #f8fafc;
      border: 2px solid #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: inherit;
      color: #1e293b;
    }
    .option:hover { border-color: #3b82f6; background-color: #eff6ff; }

    /* Classes to show if answer is right or wrong */
    .option.correct { background-color: #d1fae5; border-color: #10b981; color: #065f46; }
    .option.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
    
    /* =========================================
       5. RESULTS SCREEN ELEMENTS (Hidden by default)
       ========================================= */
    #results-screen { display: none; }
    
    .result-score {
      font-size: 60px;
      font-weight: 700;
      color: #10b981;
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <!-- The main wrapper holding all screens -->
  <div class="quiz-container">

    <!-- =========================================
         SCREEN 1: START SCREEN
         ========================================= -->
    <div id="start-screen">
      <h1>IT Quiz Challenge</h1>
      <p class="subtitle">Test your basic IT knowledge. 5 random questions!</p>
      <button class="btn" id="start-btn">Start Quiz</button>
    </div>

    <!-- =========================================
         SCREEN 2: QUIZ SCREEN
         ========================================= -->
    <div id="quiz-screen">
      <!-- Top bar showing question number and score -->
      <div class="header-info">
        <span id="question-number">Question 1/5</span>
        <span class="score-text">Score: <span id="score">0</span></span>
      </div>

      <!-- The question goes here -->
      <h2 id="question-text">Loading Question...</h2>

      <!-- The 4 answer buttons will be injected here by JavaScript -->
      <div class="options-grid" id="options-container"></div>
    </div>

    <!-- =========================================
         SCREEN 3: RESULTS SCREEN
         ========================================= -->
    <div id="results-screen">
      <h1>Quiz Finished!</h1>
      <p class="subtitle">You scored:</p>
      <div class="result-score" id="final-score">0/5</div>
      <button class="btn" id="restart-btn">Try Again</button>
    </div>

  </div>

  <script>
    // =========================================
    // 1. THE QUESTION BANK (Database of questions)
    // =========================================
    // This is an array of objects. Each object has a question, 4 options, and the index of the correct answer (0 to 3).
    const questionsBank = [
      {
        question: "What does CPU stand for?",
        options: ["Central Processing Unit", "Computer Personal Unit", "Central Process Utility", "Control Processing Unit"],
        correctAnswer: 0 // Means "Central Processing Unit"
      },
      {
        question: "Which company developed the JavaScript language?",
        options: ["Microsoft", "Netscape", "Google", "Apple"],
        correctAnswer: 1 // Means "Netscape"
      },
      {
        question: "What does RAM stand for?",
        options: ["Read Access Memory", "Random Access Memory", "Rapid Access Memory", "Run Active Memory"],
        correctAnswer: 1
      },
      {
        question: "Which one is a programming language?",
        options: ["HTML", "CSS", "Python", "HTTP"],
        correctAnswer: 2
      },
      {
        question: "What is the binary representation of the number 5?",
        options: ["101", "110", "100", "011"],
        correctAnswer: 0
      },
      {
        question: "Which protocol is used to browse websites?",
        options: ["FTP", "SMTP", "HTTP", "SSH"],
        correctAnswer: 2
      }
    ];

    // =========================================
    // 2. STATE VARIABLES (Keeping track of the game)
    // =========================================
    let currentQuestions = []; // Will hold the 5 randomly selected questions
    let currentQuestionIndex = 0; // Tracks which question we are on (0, 1, 2, 3, 4)
    let score = 0; // Tracks user's score

    // =========================================
    // 3. GRABBING HTML ELEMENTS (DOM References)
    // =========================================
    // We link JS variables to HTML elements so we can change them later
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const questionNumberEl = document.getElementById('question-number');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('final-score');

    // =========================================
    // 4. HELPER FUNCTIONS (Tools we use)
    // =========================================
    
    // Function to shuffle an array (used to pick random questions)
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]]; // Swap elements
      }
      return array;
    }

    // Function to switch between screens
    function showScreen(screenToShow) {
      // Hide all screens
      startScreen.style.display = 'none';
      quizScreen.style.display = 'none';
      resultsScreen.style.display = 'none';
      // Show the requested screen
      screenToShow.style.display = 'block';
    }

    // =========================================
    // 5. CORE QUIZ LOGIC
    // =========================================
    
    // A) Start the Quiz
    function startQuiz() {
      // Reset game state
      currentQuestionIndex = 0;
      score = 0;
      
      // Pick 5 random questions from the bank
      // 1. Copy the bank using spread operator [...]
      // 2. Shuffle the copy
      // 3. Slice to get only the first 5
      currentQuestions = shuffleArray([...questionsBank]).slice(0, 5);
      
      showScreen(quizScreen);
      loadQuestion(); // Load the first question
    }

    // B) Load a question into the HTML
    function loadQuestion() {
      // Reset score display
      scoreEl.textContent = score;
      
      // Update "Question 1/5" text
      questionNumberEl.textContent = `Question ${currentQuestionIndex + 1}/${currentQuestions.length}`;
      
      // Get the current question object
      const currentQ = currentQuestions[currentQuestionIndex];
      
      // Put the question text on the screen
      questionText.textContent = currentQ.question;
      
      // Clear old answer buttons
      optionsContainer.innerHTML = '';

      // Create 4 buttons for the 4 options
      currentQ.options.forEach((option, index) => {
        // Create a new button element
        const button = document.createElement('button');
        // Add the CSS class for styling
        button.classList.add('option');
        // Put the option text inside the button
        button.textContent = option;
        
        // Attach a click event to this button
        // We use 'index' to know which option was clicked
        button.addEventListener('click', () => selectAnswer(index));
        
        // Add the button to the container on the webpage
        optionsContainer.appendChild(button);
      });
    }

    // C) Handle when user clicks an answer
    function selectAnswer(selectedIndex) {
      const currentQ = currentQuestions[currentQuestionIndex];
      
      // Get all the option buttons currently on screen
      const allButtons = document.querySelectorAll('.option');
      
      // Disable clicking again after answering
      allButtons.forEach(btn => btn.style.pointerEvents = 'none');
      
      // Check if the selected index matches the correct answer index
      if (selectedIndex === currentQ.correctAnswer) {
        // Correct! Turn green and add point
        allButtons[selectedIndex].classList.add('correct');
        score++;
        scoreEl.textContent = score;
      } else {
        // Wrong! Turn red, and show the correct one in green
        allButtons[selectedIndex].classList.add('wrong');
        allButtons[currentQ.correctAnswer].classList.add('correct');
      }
      
      // Wait 1.5 seconds, then move to the next question
      setTimeout(() => {
        currentQuestionIndex++;
        
        // If we finished all questions, show results
        if (currentQuestionIndex >= currentQuestions.length) {
          showResults();
        } else {
          // Otherwise, load the next question
          loadQuestion();
        }
      }, 1500); // 1500 milliseconds = 1.5 seconds
    }

    // D) Show final results
    function showResults() {
      // Put final score in the text
      finalScoreEl.textContent = `${score} / ${currentQuestions.length}`;
      showScreen(resultsScreen);
    }

    // =========================================
    // 6. EVENT LISTENERS (Waiting for user clicks)
    // =========================================
    
    // When "Start Quiz" button is clicked, run startQuiz function
    startBtn.addEventListener('click', startQuiz);
    
    // When "Try Again" button is clicked, also run startQuiz function
    restartBtn.addEventListener('click', startQuiz);

  </script>
</body>
</html>
